<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>媽媽的旅程 ― 旅行遊記</title>
<meta name="description" content="媽媽的旅行遊記合集">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f7f2e9; --paper2:#fffdf8; --ink:#2a2520; --ink-soft:#6b6256;
  --aka:#9c3a2e; --aka-soft:#c0584a; --take:#4a7a6f; --kin:#b08d4f;
  --line:#e3dac8; --shadow:rgba(60,48,30,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:"Noto Sans TC",sans-serif; color:var(--ink);
  background:var(--paper);
  background-image:radial-gradient(circle at 12% 8%,rgba(176,141,79,.06),transparent 40%),radial-gradient(circle at 88% 92%,rgba(74,122,111,.06),transparent 42%);
  line-height:1.75; -webkit-font-smoothing:antialiased; min-height:100vh;
}
.serif{font-family:"Noto Serif TC",serif}
.wrap{max-width:820px;margin:0 auto;padding:0 22px}

/* HERO */
header{position:relative;text-align:center;padding:64px 22px 30px;overflow:hidden}
.stamp{position:absolute;top:34px;right:max(22px,calc(50% - 380px));width:74px;height:74px;border:2.5px solid var(--aka);border-radius:50%;color:var(--aka);display:flex;align-items:center;justify-content:center;font-family:"Noto Serif TC",serif;font-weight:700;font-size:15px;line-height:1.2;transform:rotate(-8deg);opacity:.9;writing-mode:vertical-rl;letter-spacing:3px}
.kicker{font-family:"Noto Serif TC",serif;letter-spacing:8px;color:var(--take);font-size:14px;font-weight:600;margin-bottom:14px}
h1.title{font-family:"Noto Serif TC",serif;font-weight:900;font-size:clamp(40px,10vw,72px);letter-spacing:4px;line-height:1.1;color:var(--ink)}
h1.title em{font-style:normal;color:var(--aka);display:inline-block;position:relative}
h1.title em::after{content:"";position:absolute;left:0;right:0;bottom:6px;height:11px;background:rgba(176,141,79,.28);z-index:-1}
.subtitle{margin-top:16px;font-size:15px;color:var(--ink-soft);letter-spacing:1px}

/* SECTION */
.sec-t{font-family:"Noto Serif TC",serif;font-size:20px;font-weight:700;margin:30px 0 6px;display:flex;align-items:center;gap:12px}
.sec-t::before{content:"";width:26px;height:3px;background:var(--aka);border-radius:2px}
.sec-sub{color:var(--ink-soft);font-size:13px;margin-bottom:22px;letter-spacing:1px}

/* TRIP CARDS */
.trips{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;padding-bottom:10px}
.card{display:block;text-decoration:none;color:inherit;background:var(--paper2);border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:0 4px 14px var(--shadow);transition:.28s;position:relative}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 30px var(--shadow)}
.cover{position:relative;aspect-ratio:16/10;overflow:hidden;background:var(--line)}
.cover img{width:100%;height:100%;object-fit:cover;display:block;transition:.4s}
.card:hover .cover img{transform:scale(1.05)}
.cover::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 45%,rgba(42,37,32,.55))}
.badge{position:absolute;top:12px;left:12px;z-index:2;font-size:11px;font-weight:600;letter-spacing:1px;padding:4px 11px;border-radius:20px;background:var(--aka);color:#fff;box-shadow:0 2px 8px rgba(156,58,46,.35)}
.badge.done{background:rgba(74,122,111,.92)}
.cover .ct{position:absolute;left:16px;right:16px;bottom:12px;z-index:2}
.cover .ct .t{font-family:"Noto Serif TC",serif;font-weight:900;font-size:24px;color:#fff;letter-spacing:2px;text-shadow:0 2px 10px rgba(0,0,0,.4);line-height:1.2}
.cover .ct .r{font-size:12px;color:rgba(255,255,255,.92);letter-spacing:1px;margin-top:3px;text-shadow:0 1px 6px rgba(0,0,0,.5)}
.meta{padding:14px 18px 16px}
.meta .date{font-family:"Noto Serif TC",serif;font-size:14px;color:var(--aka);font-weight:600;letter-spacing:1px}
.meta .sub{font-size:13px;color:var(--ink-soft);margin-top:6px}
.meta .go{margin-top:12px;display:flex;align-items:center;justify-content:space-between;font-size:13px;color:var(--take);font-weight:500}
.meta .go .tag{background:rgba(74,122,111,.12);padding:3px 12px;border-radius:20px;letter-spacing:1px}
.meta .go .arr{font-family:"Noto Serif TC",serif;color:var(--kin);font-size:18px;transition:.28s}
.card:hover .meta .go .arr{transform:translateX(5px)}

/* OUTRO */
.outro{text-align:center;padding:46px 22px 24px}
.outro .ja{font-family:"Noto Serif TC",serif;font-size:24px;color:var(--aka);letter-spacing:4px;margin-bottom:10px}
.outro p{color:var(--ink-soft);font-size:14px}
footer{text-align:center;padding:24px;font-size:11px;color:var(--ink-soft);letter-spacing:1px}

.reveal{opacity:0;transform:translateY(18px);transition:.7s}
.reveal.show{opacity:1;transform:none}
@media(max-width:560px){
  .stamp{display:none}
  .trips{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header>
  <div class="stamp serif">旅<br>記</div>
  <div class="wrap">
    <div class="kicker reveal show">旅 の 記 録</div>
    <h1 class="title reveal show">媽媽的<em>旅程</em></h1>
    <div class="subtitle reveal show">一趟一趟，慢慢走、慢慢記下來</div>
  </div>
</header>

<div class="wrap">
  <div class="sec-t serif reveal show">旅程一覽</div>
  <div class="sec-sub reveal show">點任一張卡片，進入那趟旅程的完整遊記</div>
  <div class="trips" id="trips"></div>
</div>

<div class="outro reveal">
  <div class="ja serif">また旅に出よう</div>
  <p>下一趟，再出發</p>
</div>
<footer>媽媽的旅程 ・ 旅行遊記合集</footer>

<script>
/* ============ 旅程清單 ============
   新增一趟：複製一個物件、改欄位、把 HTML 檔放到同層即可。
   href     對應的遊記檔名（同層）
   cover    封面圖路徑
   title    主標題
   route    路線／地點
   dates    日期
   sub      副標一句話
   tag      右下角標籤
   badge    左上角徽章（可省略）；done:true 用綠色「已完成」
*/
const trips = [
  {
    href:'tohoku.html', cover:'img/cover_tohoku.jpg',
    title:'東北・東京 九日', route:'仙台 → 福島 → 東京',
    dates:'2026.05.26 – 06.03', sub:'牛舌・寶可夢・鋼彈・媽媽的同學會',
    tag:'日本 ・ 9 天', badge:'已完成', done:true
  },
  {
    href:'nanjing.html', cover:'img/cover_nanjing.jpg',
    title:'金陵・南京 一週', route:'南京 ・ 六朝古都',
    dates:'2026.06.12 – 06.20', sub:'吃鴨・玄武湖・秦淮夜色，慢慢走',
    tag:'中國 ・ 7 天', badge:'即將出發'
  },
];

const grid = document.getElementById('trips');
trips.forEach(t=>{
  const a=document.createElement('a');
  a.className='card reveal'; a.href=t.href;
  a.innerHTML=`
    <div class="cover">
      ${t.badge?`<span class="badge${t.done?' done':''}">${t.badge}</span>`:''}
      <img loading="lazy" src="${t.cover}" alt="${t.title}">
      <div class="ct"><div class="t">${t.title}</div><div class="r">${t.route}</div></div>
    </div>
    <div class="meta">
      <div class="date">${t.dates}</div>
      <div class="sub">${t.sub}</div>
      <div class="go"><span class="tag">${t.tag}</span><span class="arr">→</span></div>
    </div>`;
  grid.appendChild(a);
});

const io=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('show');io.unobserve(e.target);}})},{threshold:.12});
document.querySelectorAll('.reveal').forEach((el,i)=>{el.style.transitionDelay=(i%4*0.06)+'s';io.observe(el);});
</script>
</body>
</html>
